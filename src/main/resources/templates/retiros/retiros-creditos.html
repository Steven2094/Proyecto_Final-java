<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retiros</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" th:href="@{/css/app.css}" />
  </head>

  <body>
    <header class="bg-light shadow-sm mb-4">
      <div class="container py-3">
        <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center">
          <h1 class="h3 m-0">Retiros</h1>
          <nav class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
            <div class="container">
              <a class="navbar-brand fw-semibold" th:href="@{/recursos}">Retiros</a>
              <div class="d-flex gap-2">
                <a class="btn-primary-2" th:href="@{/recursos/new}">+ Nuevo retiro</a>
                <a class="btn btn-outline-secondary" th:href="@{/retiros/impresion}">Versión para imprimir</a>
                <a class="btn btn-outline-secondary" th:href="@{/retiros/creditos}">Créditos</a>
                <a class="btn btn-outline-secondary" th:href="@{/retiros}">Volver</a>
              </div>
            </div>
          </nav>
        </div>
      </div>
    </header>

    <!-- Créditos y fotos del equipo -->
    <main class="container">
      <div class="card shadow-sm mb-4">
        <div class="card-body">
          <div class="d-flex flex-wrap gap-2 justify-content-between align-items-center mb-3">
            <div class="fw-semibold">Créditos</div>
          </div>
          <div class="table-responsive">
            <table class="table align-middle">
              <thead>
                <tr>
                  <th style="width: 90px">ID</th>
                  <th>Nombre</th>
                  <th style="width: 160px">Rol</th>
                  <th style="width: 160px">Foto</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>1</td>
                  <td>Evelyn García</td>
                  <td>Analista de software</td>
                  <td><img src="https://i.ibb.co/DHYbKm3m/Evelyn-Garc-a.jpg" alt="Foto de Evelyn García" width="100"></td>
                </tr>
                <tr>
                  <td>2</td>
                  <td>Brian Paiz</td>
                  <td>Programador / Desarrollador</td>
                  <td><img src="https://i.ibb.co/yFQkGCSx/Brian-2.jpg" alt="Foto de Brian Paiz" width="100"></td>
                </tr>
                <tr>
                  <td>3</td>
                  <td>Javier Quill</td>
                  <td>Evaluador / Tester</td>
                  <td><img src="https://i.ibb.co/KzVCdY3k/Javier-Quill.jpg" alt="Foto de Javier Quill" width="100"></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
